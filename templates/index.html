
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Happy Holi 🎨</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    width: 100%; height: 100%;
    overflow: hidden;
    background: #0d0820;
    font-family: Georgia, 'Times New Roman', serif;
  }

  canvas {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    display: block;
  }

  .wrapper {
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
    pointer-events: none;
    z-index: 10;
  }

  .card {
    pointer-events: auto;
    background: rgba(10, 5, 30, 0.72);
    border: 2px solid rgba(255,255,255,0.18);
    border-radius: 28px;
    padding: 36px 32px 30px;
    text-align: center;
    width: 100%;
    max-width: 400px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.7), inset 0 1px 0 rgba(255,255,255,0.1);
    animation: rise 1s ease forwards;
  }

  @keyframes rise {
    from { opacity:0; transform:translateY(50px); }
    to   { opacity:1; transform:translateY(0); }
  }

  .emoji {
    font-size: 2.8rem;
    display: block;
    margin-bottom: 8px;
    animation: sway 2s ease-in-out infinite alternate;
  }
  @keyframes sway {
    from { transform: rotate(-8deg) scale(1); }
    to   { transform: rotate(8deg) scale(1.12); }
  }

  h1 {
    font-size: 2.6rem;
    font-weight: 900;
    letter-spacing: 2px;
    margin-bottom: 4px;
    background: linear-gradient(90deg,
      #ff6ec7 0%,
      #ffe44d 20%,
      #6effb8 40%,
      #6ec6ff 60%,
      #ff8f6e 80%,
      #ff6ec7 100%
    );
    background-size: 200% auto;
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    animation: shimmer 2.5s linear infinite;
  }
  @keyframes shimmer {
    0%   { background-position: 0% center; }
    100% { background-position: 200% center; }
  }

  .year {
    font-size: 0.85rem;
    color: rgba(255,255,255,0.4);
    letter-spacing: 3px;
    text-transform: uppercase;
    margin-bottom: 18px;
  }

  .dots {
    display: flex;
    justify-content: center;
    gap: 10px;
    margin-bottom: 18px;
  }
  .dot {
    width: 18px; height: 18px;
    border-radius: 50%;
    animation: pop 1.2s ease-in-out infinite alternate;
  }
  .dot:nth-child(1){ background:#ff6ec7; animation-delay:0s; }
  .dot:nth-child(2){ background:#ffe44d; animation-delay:0.15s; }
  .dot:nth-child(3){ background:#6effb8; animation-delay:0.3s; }
  .dot:nth-child(4){ background:#6ec6ff; animation-delay:0.45s; }
  .dot:nth-child(5){ background:#ff8f6e; animation-delay:0.6s; }
  @keyframes pop {
    from { transform: scale(1); }
    to   { transform: scale(1.5); box-shadow: 0 0 14px currentColor; }
  }

  .msg {
    font-size: 0.97rem;
    color: rgba(255,255,255,0.65);
    line-height: 1.75;
    margin-bottom: 22px;
  }

  .btn {
    display: inline-block;
    padding: 13px 34px;
    font-size: 1rem;
    font-weight: bold;
    border: none;
    border-radius: 50px;
    cursor: pointer;
    color: #12002a;
    background: linear-gradient(135deg, #ff6ec7, #ffe44d, #6effb8, #6ec6ff);
    background-size: 300% 300%;
    animation: bgmove 3s ease infinite;
    box-shadow: 0 6px 24px rgba(255,110,199,0.4);
    transition: transform 0.15s, box-shadow 0.15s;
    letter-spacing: 0.5px;
  }
  @keyframes bgmove {
    0%   { background-position: 0% 50%; }
    50%  { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
  }
  .btn:active {
    transform: scale(0.95);
    box-shadow: 0 2px 12px rgba(255,110,199,0.3);
  }

  .from {
    margin-top: 18px;
    font-size: 0.78rem;
    color: rgba(255,255,255,0.28);
    letter-spacing: 1.5px;
  }
</style>
</head>
<body>

<canvas id="canvas"></canvas>

<div class="wrapper">
  <div class="card">
    <span class="emoji">🎨</span>
    <h1>Happy Holi!</h1>
    <div class="year">Festival of Colors • 2025</div>
    <div class="dots">
      <div class="dot"></div>
      <div class="dot"></div>
      <div class="dot"></div>
      <div class="dot"></div>
      <div class="dot"></div>
    </div>
    <p class="msg">
      May the vibrant colors of Holi<br>
      bring joy, love &amp; happiness<br>
      into your life! 🌈🙏
    </p>
    <button class="btn" id="splashBtn">🎊 Splash Colors!</button>
    <p class="from">— With Love &amp; Colors 💖</p>
  </div>
</div>

<script>
(function(){
  var canvas = document.getElementById('canvas');
  var ctx = canvas.getContext('2d');
  var W, H;

  function resize(){
    W = canvas.width  = window.innerWidth;
    H = canvas.height = window.innerHeight;
  }
  resize();
  window.addEventListener('resize', resize);

  var COLORS = [
    '#ff6ec7','#ffe44d','#6effb8','#6ec6ff',
    '#ff8f6e','#c06eff','#ff4455','#44ffcc',
    '#ffaa00','#00ddff'
  ];

  var particles = [];

  function randColor(){ return COLORS[Math.floor(Math.random()*COLORS.length)]; }

  function Particle(x, y, burst){
    this.x = (x !== undefined) ? x : Math.random() * W;
    this.y = (y !== undefined) ? y : -10;
    this.r = Math.random() * 7 + 3;
    this.color = randColor();
    if(burst){
      var angle = Math.random() * Math.PI * 2;
      var speed = Math.random() * 14 + 4;
      this.vx = Math.cos(angle) * speed;
      this.vy = Math.sin(angle) * speed - 6;
    } else {
      this.vx = (Math.random()-0.5) * 2;
      this.vy = Math.random() * 2 + 1;
    }
    this.gravity = 0.15;
    this.alpha = 1;
    this.fade  = Math.random() * 0.012 + 0.006;
    this.shape = Math.random() > 0.5 ? 'circle' : 'square';
    this.rot   = Math.random() * 360;
    this.spin  = (Math.random()-0.5) * 4;
  }

  Particle.prototype.update = function(){
    this.vy += this.gravity;
    this.x  += this.vx;
    this.y  += this.vy;
    this.alpha -= this.fade;
    this.rot   += this.spin;
  };

  Particle.prototype.draw = function(){
    ctx.save();
    ctx.globalAlpha = Math.max(0, this.alpha);
    ctx.fillStyle   = this.color;
    ctx.shadowColor = this.color;
    ctx.shadowBlur  = 8;
    ctx.translate(this.x, this.y);
    ctx.rotate(this.rot * Math.PI / 180);
    if(this.shape === 'circle'){
      ctx.beginPath();
      ctx.arc(0, 0, this.r, 0, Math.PI*2);
      ctx.fill();
    } else {
      ctx.fillRect(-this.r, -this.r, this.r*2, this.r*2);
    }
    ctx.restore();
  };

  Particle.prototype.dead = function(){
    return this.alpha <= 0 || this.y > H + 20;
  };

  function spawnRain(){
    if(Math.random() < 0.35){
      particles.push(new Particle());
    }
  }

  function burst(cx, cy){
    for(var i=0; i<130; i++){
      particles.push(new Particle(cx, cy, true));
    }
  }

  function loop(){
    ctx.clearRect(0,0,W,H);
    spawnRain();
    for(var i = particles.length-1; i >= 0; i--){
      particles[i].update();
      particles[i].draw();
      if(particles[i].dead()){
        particles.splice(i,1);
      }
    }
    requestAnimationFrame(loop);
  }

  loop();

  // Auto burst on load
  setTimeout(function(){ burst(W/2, H/2); }, 600);
  setInterval(function(){
    burst(Math.random()*W, Math.random()*H*0.6);
  }, 4000);

  // Button tap
  document.getElementById('splashBtn').addEventListener('click', function(){
    burst(W/2, H*0.4);
    burst(W*0.2, H*0.3);
    burst(W*0.8, H*0.3);
  });

  // Touch burst anywhere on screen
  canvas.addEventListener('touchstart', function(e){
    var t = e.touches[0];
    burst(t.clientX, t.clientY);
    e.preventDefault();
  }, {passive:false});

  canvas.addEventListener('click', function(e){
    burst(e.clientX, e.clientY);
  });

})();
</script>
</body>
</html>
